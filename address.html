<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Address - Mobile Valuation</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="page-container">
    <!-- Navigation -->
    <nav class="page-nav">
      <a href="index.html" class="nav-back">← Back to Home</a>
    </nav>

    <!-- Main Content -->
    <main>
      <h1>Where's your property?</h1>
      <p class="subtitle">We'll use your location to find your property</p>

      <!-- Location Button -->
      <button type="button" id="location-button" class="button button-primary button-full">
        <span aria-hidden="true">📍</span> Use My Location
      </button>

      <!-- Address Display (hidden until location captured) -->
      <div id="address-display" class="address-display" style="display: none;">
        <div class="address-card">
          <div class="address-icon">✓</div>
          <div class="address-content">
            <div class="address-label">Property Address</div>
            <div class="address-value" id="address-text">—</div>
          </div>
        </div>
      </div>

      <!-- Continue Button -->
      <button type="button" id="continue-button" class="button button-secondary button-full" disabled style="display: none;">
        Continue →
      </button>

      <!-- Privacy Note -->
      <p class="privacy-note"><span aria-hidden="true">🔒</span> Your data stays private</p>
    </main>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/address-simple.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
