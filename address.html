<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Address - Mobile Valuation</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Property Address</h1>
            <p class="subtitle">Where is the property located?</p>
        </header>

        <main>
            <form id="address-form" novalidate>
                <button type="button" id="location-btn" class="location-btn">
                    <span aria-hidden="true">📍</span> Use My Location
                </button>

                <div class="form-group">
                    <label for="street">Street Address</label>
                    <input
                        type="text"
                        id="street"
                        name="street"
                        autocomplete="off"
                        placeholder="123 Main St"
                        required
                        aria-describedby="street-error"
                    >
                    <div id="street-error" class="error-message" role="alert" aria-live="polite"></div>
                </div>

                <div class="form-group">
                    <label for="city">City</label>
                    <input
                        type="text"
                        id="city"
                        name="city"
                        placeholder="San Francisco"
                        required
                        aria-describedby="city-error"
                    >
                    <div id="city-error" class="error-message" role="alert" aria-live="polite"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="state">State</label>
                        <input
                            type="text"
                            id="state"
                            name="state"
                            maxlength="2"
                            placeholder="CA"
                            required
                            aria-describedby="state-error"
                        >
                        <div id="state-error" class="error-message" role="alert" aria-live="polite"></div>
                    </div>

                    <div class="form-group">
                        <label for="zip">ZIP Code</label>
                        <input
                            type="text"
                            id="zip"
                            name="zip"
                            maxlength="5"
                            inputmode="numeric"
                            pattern="[0-9]{5}"
                            placeholder="94102"
                            required
                            aria-describedby="zip-error"
                        >
                        <div id="zip-error" class="error-message" role="alert" aria-live="polite"></div>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Continue to Photos</button>
            </form>
        </main>
    </div>

    <script type="module" src="js/address-page.js"></script>
</body>
</html>
